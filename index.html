<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPU信息推送</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }
        label .required {
            color: #e74c3c;
        }
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .file-upload-area {
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }
        .file-upload-area:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .file-upload-area.has-file {
            border-color: #10b981;
            background: #f0fdf4;
        }
        .file-upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .file-upload-text {
            color: #6b7280;
            font-size: 14px;
        }
        .file-name {
            color: #10b981;
            font-weight: 500;
            margin-top: 8px;
        }
        #imageInput {
            display: none;
        }
        .preview-container {
            margin-top: 12px;
            display: none;
        }
        .preview-container.show {
            display: block;
        }
        .preview-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
        .remove-image {
            color: #ef4444;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
            display: inline-block;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .submit-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .status.show {
            display: block;
        }
        .status.success {
            background: #d1fae5;
            color: #065f46;
        }
        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }
        .status.loading {
            background: #e0e7ff;
            color: #3730a3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 SPU信息推送</h1>
        
        <div class="form-group">
            <label>文本内容 <span class="required">*</span></label>
            <textarea id="textInput" placeholder="请输入SPU相关信息..." required></textarea>
        </div>
        
        <div class="form-group">
            <label>图片 <span class="required">*</span></label>
            <div class="file-upload">
                <div class="file-upload-area" id="uploadArea" onclick="document.getElementById('imageInput').click()">
                    <div class="file-upload-icon">📷</div>
                    <div class="file-upload-text">点击上传图片 <span style="color: #e74c3c;">(必填)</span></div>
                    <div class="file-name" id="fileName"></div>
                </div>
                <input type="file" id="imageInput" accept="image/*" required>
            </div>
            <div class="preview-container" id="previewContainer">
                <img class="preview-image" id="previewImage">
                <span class="remove-image" onclick="removeImage()">移除图片</span>
            </div>
        </div>
        
        <button class="submit-btn" id="submitBtn" onclick="submitForm()">提交</button>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        const CONFIG = {
            streamUrl: 'https://api.coze.cn/v1/workflow/stream_run',
            uploadUrl: 'https://api.coze.cn/v1/files/upload',
            token: 'pat_LWUDCPdRx0RZJEb2TEzlpBgtQYvxATSarA8B2v2wRmFv5dDuJBEp1ZwXw4BvH878',
            workflowId: '7628451597525270582'
        };
        
        let selectedFile = null;
        let imageBase64 = null;
        
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('uploadArea').classList.add('has-file');
                const reader = new FileReader();
                reader.onload = function(e) {
                    imageBase64 = e.target.result;
                    document.getElementById('previewImage').src = e.target.result;
                    document.getElementById('previewContainer').classList.add('show');
                };
                reader.readAsDataURL(file);
            }
        });
        
        function removeImage() {
            selectedFile = null;
            imageBase64 = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('fileName').textContent = '';
            document.getElementById('uploadArea').classList.remove('has-file');
            document.getElementById('previewContainer').classList.remove('show');
        }
        
        async function submitForm() {
            const textInput = document.getElementById('textInput').value.trim();
            
            if (!textInput) {
                showStatus('请输入文本内容', 'error');
                return;
            }
            
            if (!selectedFile) {
                showStatus('请上传图片', 'error');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '上传图片中...';
            showStatus('正在上传图片，请稍候...', 'loading');
            
            try {
                const formData = new FormData();
                formData.append('file', selectedFile);
                
                const uploadResponse = await fetch(CONFIG.uploadUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${CONFIG.token}`
                    },
                    body: formData
                });
                
                const uploadResult = await uploadResponse.json();
                
                if (uploadResult.code !== 0 || !uploadResult.data || !uploadResult.data.id) {
                    showStatus('图片上传失败：' + (uploadResult.msg || '未知错误'), 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '提交';
                    return;
                }
                
                const fileId = uploadResult.data.id;
                
                submitBtn.textContent = '提交中...';
                showStatus('正在处理数据，请稍候...', 'loading');
                
                const parameters = {
                    input: textInput,
                    files: JSON.stringify({ file_id: fileId })
                };
                
                const response = await fetch(CONFIG.streamUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${CONFIG.token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'text/event-stream'
                    },
                    body: JSON.stringify({
                        workflow_id: CONFIG.workflowId,
                        parameters: parameters
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    showStatus('HTTP错误 ' + response.status + '：' + errorText, 'error');
                    return;
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let result = '';
                let hasError = false;
                let errorMsg = '';
                let rawResponse = '';
                let workflowOutput = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    rawResponse += chunk;
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            try {
                                const data = JSON.parse(line.substring(5).trim());
                                
                                if (data.event === 'Error') {
                                    hasError = true;
                                    errorMsg = data.error_message || '工作流执行错误';
                                } else if (data.event === 'Done') {
                                    workflowOutput = 'done';
                                }
                            } catch (e) {}
                        }
                    }
                }
                
                if (hasError) {
                    showStatus('执行失败：' + errorMsg, 'error');
                    const responseDiv = document.createElement('div');
                    responseDiv.style.cssText = 'margin-top: 15px; padding: 15px; background: #f8f9fa; border-radius: 8px; max-height: 300px; overflow-y: auto; text-align: left; font-size: 12px;';
                    responseDiv.innerHTML = '<strong>API响应：</strong><br><pre style="white-space: pre-wrap;">' + rawResponse + '</pre>';
                    document.getElementById('status').appendChild(responseDiv);
                } else {
                    showStatus('提交成功！数据已写入飞书表格', 'success');
                    document.getElementById('textInput').value = '';
                    removeImage();
                }
                
            } catch (error) {
                showStatus('错误：' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '提交';
            }
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status show ' + type;
        }
    </script>
</body>
</html>
